name: Release project

on:
  push:
    branches: [ main ]
    paths:
      - "chapter5/project/**"
    tags:
      - "*"
  workflow_dispatch:

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish todo-app
        run: |-
          docker build --tag "${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA" \
            ./chapter5/project/todo-app
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA"

      - name: Build and publish todo-backend
        run: |-
          docker build --tag "${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA" \
            ./chapter5/project/todo-backend
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA"

      - name: Build and publish broadcaster
        run: |-
          docker build --tag "${{ secrets.DOCKERHUB_USERNAME }}/broadcaster:$GITHUB_SHA" \
            ./chapter5/project/todo-backend
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/broadcaster:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: "5.8.1"

      - name: Use new images for staging
        working-directory: ./chapter5/project/overlays/staging
        run: |-
          kustomize edit set image TODO_APP=${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA
          kustomize edit set image TODO_BACKEND=${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA
          kustomize edit set image BROADCASTER=${{ secrets.DOCKERHUB_USERNAME }}/broadcaster:$GITHUB_SHA  

      - name: Commit staging/kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v10
        with:
          add: "chapter5/project/overlays/staging/kustomization.yaml"
          message: New staging version released ${{ github.sha }}
          push: "origin HEAD:refs/heads/main"

      - name: Use new images for production if commit is tagged
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: ./chapter5/project/overlays/prod
        run: |-
          kustomize edit set image TODO_APP=${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA
          kustomize edit set image TODO_BACKEND=${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA
          kustomize edit set image BROADCASTER=${{ secrets.DOCKERHUB_USERNAME }}/broadcaster:$GITHUB_SHA  

      - name: Commit prod/kustomization.yaml to GitHub if commit is tagged
        if: startsWith(github.ref, 'refs/tags/')
        uses: EndBug/add-and-commit@v10
        with:
          add: "chapter5/project/overlays/prod/kustomization.yaml"
          message: New production version released ${{ github.sha }}
          push: "origin HEAD:refs/heads/main"
