name: Release project

on:
  push:
    branches: [ main ]
    paths:
      - "chapter5/project/**"
  workflow_dispatch:

jobs:
  build-publish-deploy:
    name: Build, Publish and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish todo-app
        run: |-
          docker build --tag "${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA" \
            ./chapter5/project/todo-app
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA"

      - name: Build and publish todo-backend
        run: |-
          docker build --tag "${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA" \
            ./chapter5/project/todo-backend
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA"

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v3
        with:
          kustomize-version: "5.8.1"

      - name: Use right images
        working-directory: ./chapter5/project
        run: |-
          kustomize edit set image TODO_APP=${{ secrets.DOCKERHUB_USERNAME }}/todo-app:$GITHUB_SHA
          kustomize edit set image TODO_BACKEND=${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:$GITHUB_SHA

      - name: Commit kustomization.yaml to GitHub
        uses: EndBug/add-and-commit@v10
        with:
          add: "chapter5/project/kustomization.yaml"
          message: New version released ${{ github.sha }}
