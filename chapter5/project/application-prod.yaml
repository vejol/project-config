apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vejol/kubernetes-submissions
    path: chapter5/project/overlays/prod
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: project-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: batch
      kind: CronJob
      jqPathExpressions:
        - .spec.jobTemplate.spec.template.spec.containers[].imagePullPolicy
        - .spec.jobTemplate.spec.template.spec.containers[].terminationMessagePath
        - .spec.jobTemplate.spec.template.spec.containers[].terminationMessagePolicy
        - .spec.jobTemplate.spec.template.metadata.creationTimestamp
        - .status
