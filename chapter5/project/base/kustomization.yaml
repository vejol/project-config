apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project
resources:
  - todo-app/namespace.yaml
  - todo-app/deployment.yaml
  - todo-app/pvc.yaml
  - todo-app/service.yaml
  - todo-app/gateway.yaml
  - todo-app/route.yaml

  - todo-backend/deployment.yaml
  - todo-backend/hourly-todo.yaml
  - todo-backend/service.yaml
  - todo-backend/statefulset.yaml
  - todo-backend/cronjob-postgres-backup.yaml
  - todo-backend/postgres-config.yaml

  - broadcaster/deployment.yaml

images:
  - name: TODO_APP
    newName: vesajo/todo-app
    newTag: 656bc31364589805aa966e505bf0f986031aaef3
  - name: TODO_BACKEND
    newName: vesajo/todo-backend
    newTag: 656bc31364589805aa966e505bf0f986031aaef3
  - name: BROADCASTER
    newName: vesajo/broadcaster
