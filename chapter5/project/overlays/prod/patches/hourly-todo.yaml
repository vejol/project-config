apiVersion: batch/v1
kind: CronJob
metadata:
  name: hourly-todo
  namespace: project
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: hourly-todo-cron
              env:
                - name: BACKEND_URL
                  value: "http://prod-todo-backend-svc:80/todos"
