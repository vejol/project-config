apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: project-staging

resources:
- ./../../base

namePrefix: staging-

helmCharts:
- name: nats
  releaseName: my-nats
  repo: oci://registry-1.docker.io/bitnamicharts
  valuesFile: ./../../base/nats_values.yaml
  version: 9.0.28

patches:
- path: patches/postgres-config.yaml
- path: patches/todo-app-deployment.yaml
- path: patches/hourly-todo.yaml
- path: patches/route.yaml

images:
- name: BROADCASTER
  newName: vesajo/broadcaster
  newTag: 738b002b25c8e23a16ad24bf995e404f7135193d
- name: TODO_APP
  newName: vesajo/todo-app
  newTag: 738b002b25c8e23a16ad24bf995e404f7135193d
- name: TODO_BACKEND
  newName: vesajo/todo-backend
  newTag: 738b002b25c8e23a16ad24bf995e404f7135193d
